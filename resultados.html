<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados | SayanFitness</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="estilos_desktop.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0b0f1a, #111a2c);
            color: white;
            overflow-x: hidden;
        }

        .contenedor {
            max-width: 1100px;
            margin: auto;
            padding: 40px;
            text-align: center;
        }

        h1 { margin-bottom: 10px; font-size: 2.5rem; }
        p { color: #ccc; margin-bottom: 40px; }

        /* Estilo del botón Volver para que se vea Neón */
        .btn-volver {
            display: inline-block;
            margin-top: 50px;
            padding: 15px 35px;
            background: transparent;
            color: cyan;
            border: 2px solid cyan;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-volver:hover {
            background: cyan;
            color: #0b0f1a;
            box-shadow: 0 0 20px cyan, 0 0 50px rgba(0, 255, 255, 0.6);
            transform: translateY(-3px);
        }
    </style>
</head>

<body>

<div class="contenedor">
    <h1>📊 Resultados Esperados</h1>
    <p>La mayoría de los usuarios experimenta mejoras progresivas durante los 28 días del programa SayanFitness.</p>

    <section class="contenedor-3d-graficos">
        <div class="card-grafico">
            <canvas id="graficoLineas"></canvas>
        </div>

        <div class="card-grafico">
            <canvas id="graficoBarras"></canvas>
        </div>
    </section>

    <a href="index.html" class="btn-volver">
        ⬅ Volver al Inicio
    </a>
</div>

<script src="graficos.js"></script>

</body>
</html>
