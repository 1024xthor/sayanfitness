<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados | SayanFitness</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Russo+One&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="estilos_desktop.css">

    <style>
        body {
            margin: 0;
            /* SE ELIMINÓ ARIAL. BIENVENIDO ORBITRON, AMO MEGATRON */
            font-family: 'Orbitron', sans-serif !important; 
            background: linear-gradient(135deg, #0b0f1a, #111a2c);
            color: white;
            overflow-x: hidden;
            letter-spacing: 1px;
        }

        .contenedor {
            max-width: 1100px;
            margin: auto;
            padding: 40px;
            text-align: center;
        }

        /* TÍTULOS CON RUSSO ONE PARA MÁXIMO IMPACTO */
        h1 { 
            font-family: 'Russo One', sans-serif !important;
            margin-bottom: 10px; 
            font-size: 2.8rem; 
            text-transform: uppercase;
            text-shadow: 0 0 15px cyan;
        }

        p { 
            color: #ccc; 
            margin-bottom: 40px; 
            font-weight: 400;
        }

        /* Estilo del botón Volver con tipografía de combate */
        .btn-volver {
            display: inline-block;
            margin-top: 50px;
            padding: 15px 35px;
            background: transparent;
            color: cyan;
            border: 2px solid cyan;
            /* TIPOGRAFÍA DE ÉLITE */
            font-family: 'Orbitron', sans-serif !important;
            font-weight: 900;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-volver:hover {
            background: cyan;
            color: #0b0f1a;
            box-shadow: 0 0 20px cyan, 0 0 50px rgba(0, 255, 255, 0.6);
            transform: translateY(-3px);
        }

        /* Aseguramos que los gráficos respeten el espacio 3D definido en estilos_desktop.css */
        .contenedor-3d-graficos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            perspective: 1200px;
        }
    </style>
</head>

<body>

<div class="contenedor">
    <h1>📊 Resultados Esperados</h1>
    <p>La mayoría de los usuarios experimenta mejoras progresivas durante los 28 días del programa SayanFitness.</p>

    <section class="contenedor-3d-graficos">
        <div class="card-grafico">
            <canvas id="graficoLineas"></canvas>
        </div>

        <div class="card-grafico">
            <canvas id="graficoBarras"></canvas>
        </div>
    </section>

    <a href="index.html" class="btn-volver">
        ⬅ Volver al Inicio
    </a>
</div>

<script src="graficos.js"></script>

</body>
</html>
